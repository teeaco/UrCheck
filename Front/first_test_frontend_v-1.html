<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЮРCHECK - Разбирайтесь в договорах и избегайте рисков</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
            padding: 0px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            background: linear-gradient(180deg, #46abae, transparent);
            padding-inline: 40px;
            padding-block: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        h1 {
            color: #2c3e50;
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-size: 30px;
        }
        
        .subtitle {
            color: #7f8c8d;
            font-size: 1.1rem;
        }
        
        .upload-section {
            background-color: #a1d4d6;
            border-radius: 12px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .drop-area {
            border: 3px dashed #bdc3c7;
            border-radius: 10px;
            padding: 60px 20px;
            margin: 30px 0;
            transition: all 0.3s ease;
            cursor: pointer;
            background: #fff;
        }
        
        .drop-area:hover, .drop-area.dragover {
            border-color: #3498db;
            background-color: #c6fdff;
        }
        
        .drop-area i {
            font-size: 64px;
            color: #46abae;
            margin-bottom: 20px;
        }
        
        .drop-area h3 {
            margin-bottom: 15px;
            color: #2c3e50;
        }
        
        .drop-area p {
            color: #7f8c8d;
            margin-bottom: 20px;
        }
        
        .file-input {
            display: none;
        }
        
        .file-label {
            display: inline-block;
            background-color: #a1d4d6;
            color: white;
            padding: 12px 30px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.3s;
        }
        
        .file-label:hover {
            background-color: #628688;
        }
        
        .selected-file {
            margin-top: 20px;
            padding: 15px;
            background-color: #ecf0f1;
            border-radius: 6px;
            display: none;
        }
        
        .selected-file.show {
            display: block;
        }
        
        .file-name {
            font-weight: 600;
            color: #2c3e50;
        }
        
        .file-size {
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-left: 10px;
        }
        
        .button-container {
            text-align: center;
            margin-top: 30px;
        }
        
        .analyze-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 1.1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(46, 204, 113, 0.2);
        }
        
        .analyze-btn:hover {
            background-color: #27ae60;
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(46, 204, 113, 0.3);
        }
        
        .analyze-btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .report-section {
            background-color: white;
            border-radius: 12px;
            padding: 40px;
            margin-top: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            display: none;
        }
        
        .report-section.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #ecf0f1;
        }
        
        .report-header h2 {
            color: #2c3e50;
        }
        
        .back-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.3s;
        }
        
        .back-btn:hover {
            background-color: #c0392b;
        }
        
        .report-content {
            line-height: 1.8;
        }
        
        .report-item {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #ecf0f1;
        }
        
        .report-item:last-child {
            border-bottom: none;
        }
        
        .report-label {
            font-weight: 600;
            color: #2c3e50;
            display: inline-block;
            width: 200px;
        }
        
        .report-value {
            color: #34495e;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        footer {
            text-align: center;
            margin-top: 50px;
            color: #95a5a6;
            font-size: 0.9rem;
        }
        
        .progress-bar {
            width: 100%;
            height: 10px;
            background-color: #ecf0f1;
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
            display: none;
        }
        
        .progress-fill {
            height: 100%;
            background-color: #3498db;
            width: 0%;
            transition: width 0.5s ease;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .upload-section, .report-section {
                padding: 25px;
            }
            
            .report-label {
                width: 150px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <img src="icon-logo.svg" width="128" height="128" style="margin: -10px;">
            <h1>ЮРCHECK - РАЗБИРАЙТЕСЬ В ДОГОВОРАХ. ИЗБЕГАЙТЕ РИСКОВ</h1>
    </header>

    <div class="container">
        <section class="upload-section" id="uploadSection">
            <h2>Загрузите документ</h2>
            <p>Перетащите файл в область ниже или выберите его вручную</p>
            
            <div class="drop-area" id="dropArea">
                <img src="icon-file.svg" width="100" height="100">
                <h3>Перетащите файл сюда</h3>
                <p>Максимальный размер: 10 MB</p>
                <label for="fileInput" class="file-label">
                    <i class="fas fa-folder-open"></i> Выбрать файл
                </label>
                <input type="file" id="fileInput" class="file-input">
            </div>
            
            <div class="selected-file" id="selectedFile">
                <p>Выбран файл: <span class="file-name" id="fileName">Название файла</span> <span class="file-size" id="fileSize">(0 MB)</span></p>
            </div>
            
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            
            <div class="button-container">
                <button class="analyze-btn" id="analyzeBtn" disabled style="display: flex; align-items: center; gap: 8px; justify-self: center;"><img src="icon-analise.svg" width="32" height="32" style="filter: invert(1);">Анализировать файл</button>
            </div>
        </section>
        
        <section class="report-section" id="reportSection">
            <div class="report-header">
                <h2>Результаты анализа</h2>
                <button class="back-btn" id="backBtn">
                    <i class="fas fa-arrow-left"></i> Назад
                </button>
            </div>
            
            <div class="report-content" id="reportContent">
                <!-- Содержимое отчета будет сгенерировано динамически -->
            </div>
        </section>
        
        <footer>
            <p>ЮрЧек &copy; 2025 | Поддерживаемые форматы: DOCX | ИУ5-55Б</p>
        </footer>
    </div>

    <script>
        // Элементы DOM
        const dropArea = document.getElementById('dropArea');
        const fileInput = document.getElementById('fileInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const backBtn = document.getElementById('backBtn');
        const selectedFile = document.getElementById('selectedFile');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const uploadSection = document.getElementById('uploadSection');
        const reportSection = document.getElementById('reportSection');
        const reportContent = document.getElementById('reportContent');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        
        let currentFile = null;
        
        // Обработчики событий для области перетаскивания
        dropArea.addEventListener('click', () => fileInput.click());
        
        fileInput.addEventListener('change', function() {
            if (this.files.length > 0) {
                handleFile(this.files[0]);
            }
        });
        
        // Предотвращаем стандартное поведение браузера для перетаскивания
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, preventDefaults, false);
        });
        
        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }
        
        // Подсветка области при перетаскивании
        ['dragenter', 'dragover'].forEach(eventName => {
            dropArea.addEventListener(eventName, highlight, false);
        });
        
        ['dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, unhighlight, false);
        });
        
        function highlight() {
            dropArea.classList.add('dragover');
        }
        
        function unhighlight() {
            dropArea.classList.remove('dragover');
        }
        
        // Обработка сброса файла
        dropArea.addEventListener('drop', handleDrop, false);
        
        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            
            if (files.length > 0) {
                handleFile(files[0]);
            }
        }
        
        // Обработка выбранного файла
        function handleFile(file) {
            currentFile = file;
            
            // Отображаем информацию о файле
            fileName.textContent = file.name;
            fileSize.textContent = `(${(file.size / (1024 * 1024)).toFixed(2)} MB)`;
            selectedFile.classList.add('show');
            
            // Активируем кнопку анализа
            analyzeBtn.disabled = false;
        }
        
        // Обработка кнопки анализа
        analyzeBtn.addEventListener('click', function() {
            if (!currentFile) return;
            
            // Показываем индикатор прогресса
            progressBar.style.display = 'block';
            progressFill.style.width = '0%';
            
            // Симуляция процесса анализа с прогрессом
            simulateAnalysis();
        });
        
        // Симуляция процесса анализа
        function simulateAnalysis() {
            let progress = 0;
            const interval = setInterval(() => {
                progress += 5;
                progressFill.style.width = `${progress}%`;
                
                if (progress >= 100) {
                    clearInterval(interval);
                    
                    // Скрываем секцию загрузки и показываем отчет
                    uploadSection.style.display = 'none';
                    reportSection.classList.add('show');
                    
                    // Генерируем отчет
                    generateReport(currentFile);
                }
            }, 100);
        }
        
        // Генерация отчета
        function generateReport(file) {
            const fileSizeMB = (file.size / (1024 * 1024)).toFixed(2);
            const fileType = file.type || 'Неизвестный тип';
            const lastModified = new Date(file.lastModified).toLocaleString('ru-RU');
            
            // Создаем случайные данные для отчета
            const isSafe = Math.random() > 0.3;
            const threatCount = isSafe ? 0 : Math.floor(Math.random() * 5) + 1;
            const fileIntegrity = Math.random() > 0.1 ? 'Целостность не нарушена' : 'Обнаружены изменения';
            
            // Генерируем содержимое отчета
            let reportHTML = `
                <div class="report-item">
                    <span class="report-label">Имя файла:</span>
                    <span class="report-value">${file.name}</span>
                </div>
                <div class="report-item">
                    <span class="report-label">Тип файла:</span>
                    <span class="report-value">${fileType}</span>
                </div>
                <div class="report-item">
                    <span class="report-label">Размер файла:</span>
                    <span class="report-value">${fileSizeMB} MB</span>
                </div>
                <div class="report-item">
                    <span class="report-label">Последнее изменение:</span>
                    <span class="report-value">${lastModified}</span>
                </div>
                <div class="report-item">
                    <span class="report-label">Безопасность:</span>
                    <span class="report-value" style="color: ${isSafe ? '#27ae60' : '#e74c3c'}; font-weight: 600;">
                        ${isSafe ? 'Файл безопасен' : 'Обнаружены потенциальные угрозы'}
                    </span>
                </div>
                <div class="report-item">
                    <span class="report-label">Найдено угроз:</span>
                    <span class="report-value">${threatCount}</span>
                </div>
                <div class="report-item">
                    <span class="report-label">Целостность файла:</span>
                    <span class="report-value">${fileIntegrity}</span>
                </div>
                <div class="report-item">
                    <span class="report-label">Рекомендации:</span>
                    <span class="report-value">${getRecommendation(isSafe, threatCount)}</span>
                </div>
            `;
            
            reportContent.innerHTML = reportHTML;
        }
        
        // Функция для получения рекомендаций
        function getRecommendation(isSafe, threatCount) {
            if (isSafe) {
                return "Файл можно использовать без ограничений. Рекомендуется регулярно проверять файлы на наличие угроз.";
            } else {
                if (threatCount > 3) {
                    return "Файл содержит несколько потенциальных угроз. Рекомендуется удалить файл и выполнить проверку системы.";
                } else {
                    return "Файл содержит подозрительные элементы. Рекомендуется проверить файл антивирусом перед использованием.";
                }
            }
        }
        
        // Обработка кнопки "Назад"
        backBtn.addEventListener('click', function() {
            // Скрываем отчет и показываем секцию загрузки
            reportSection.classList.remove('show');
            uploadSection.style.display = 'block';
            
            // Сбрасываем форму
            currentFile = null;
            selectedFile.classList.remove('show');
            analyzeBtn.disabled = true;
            fileInput.value = '';
            progressBar.style.display = 'none';
        });
    </script>
</body>
</html>
