        // Элементы DOM

        uploadSection.addEventListener('submit', async (e) => {
            e.preventDefault();  // ← ДОЛЖНО БЫТЬ ПЕРВЫМ!
            
            console.log('Форма отправлена');

            //const fileInput = document.getElementById('file');
            if (!fileInput.files[0]) {

                return;
            }

            statusEl.textContent = 'Отправляю...';

            try {
                console.log('Отправляю на сервер...');

                statusEl.textContent = 'Успех!';
                resultEl.textContent = `Файл: ${data.file_name}`;
                //generateReport(data.result_text);
                
                generateReport(SGR_SCHEMA, data.result_text);

        // Обработчики событий для области перетаскивания
        dropArea.addEventListener('click', (e) => {
            if (e.target !== fileInput && e.target.tagName !== 'LABEL') {
                fileInput.click();
            }
        });
        
        fileInput.addEventListener('change', function() {
            if (this.files.length > 0) {
                handleFile(this.files[0]);
            }
        });
        
        // Предотвращаем стандартное поведение браузера для перетаскивания
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, preventDefaults, false);
        });
        
        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }
        
        // Подсветка области при перетаскивании
        ['dragenter', 'dragover'].forEach(eventName => {
            dropArea.addEventListener(eventName, highlight, false);
        });
        
        ['dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, unhighlight, false);
        });
        
        function highlight() {
            dropArea.classList.add('dragover');
        }
        
        function unhighlight() {
            dropArea.classList.remove('dragover');
        }
        
        // Обработка сброса файла
        dropArea.addEventListener('drop', handleDrop, false);
        
        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            
            if (files.length > 0) {
                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(files[0]);
                fileInput.files = dataTransfer.files;
                
                handleFile(files[0]);
            }
        }

            fileSize.textContent = `(${(file.size / (1024 * 1024)).toFixed(2)} MB)`;

            simulateAnalysis();
        });

                    reportSection.classList.add('show');

        function generateReport(schema, data) {
            let html = '';
            //console.log('start gen', schema, data);
            function processObject(obj, schemaPart, path = '') {
                //console.log('obj', obj);
                //console.log('schemaPart', schemaPart);
                //console.log('path', path);

                for (const key in obj) {
                    //console.log(key, obj, obj.hasOwnProperty(key));
                    if (obj.hasOwnProperty(key)) {
                        const currentPath = path ? `${path}.${key}` : key;
                        const value = obj[key];
                        const label = getLabelFromSchema(schemaPart, key);
                        //console.log(currentPath, label, value);
                        if (value === null || value === undefined) {
                            continue;
                        }
                        
                        if (typeof value === 'object' && !Array.isArray(value)) {
                            // Рекурсивно обрабатываем вложенные объекты
                            //console.log('is object',label, value);
                            if (schemaPart && schemaPart[key]) {
                                processObject(value, schemaPart[key], currentPath);
                            }
                        } else if (Array.isArray(value)) {
                            //console.log('is array',label, value);
                            // Обрабатываем массивы
                            if (value.length > 0) {
                                const arrayValue = value.join(', ');
                                html += createReportItem(label, arrayValue);
                            }
                        } else {
                            // Обрабатываем простые значения
                            html += createReportItem(label, value);
                            //console.log(label, value);
                            //html += label+'<br>'+value+'<br><br>';
                        }
                    }
                }
            }
            
            function getLabelFromSchema(schemaPart, key) {
                if (!schemaPart) return key;
                
                if (typeof schemaPart[key] === 'string') {
                    return schemaPart[key];
                } else if (typeof schemaPart[key] === 'object' && schemaPart[key] !== null) {
                    // Если в схеме объект, но нам нужен заголовок для самого ключа
                    // можно вернуть ключ или поискать заголовок в родительской структуре
                    return key;
                }
                return key;
            }
            
            function createReportItem(label, value) {
                // Функция для определения цвета на основе значения (особенно для risk_level)
                const getValueStyle = (labelText, val) => {
                    if (labelText.includes('риск') || labelText.includes('risk')) {
                        const risk = val.toLowerCase();
                        if (risk.includes('низкий') || risk.includes('низкий риск') || risk === 'низкий') {
                            return 'color: #27ae60; font-weight: 600;';
                        } else if (risk.includes('средний') || risk.includes('средний риск') || risk === 'средний') {
                            return 'color: #f39c12; font-weight: 600;';
                        } else if (risk.includes('высокий') || risk.includes('высокий риск') || risk === 'высокий') {
                            return 'color: #e74c3c; font-weight: 600;';
                        }
                    } else if (labelText.includes('статус') || labelText.includes('status')) {
                        if (val.includes('найден') || val === 'найден') {
                            return 'color: #27ae60; font-weight: 600;';
                        } else if (val.includes('не найден') || val === 'не найден') {
                            return 'color: #e74c3c; font-weight: 600;';
                        }
                    } else if (labelText.includes('оценка') || labelText.includes('assessment')) {
                        if (val.includes('БЕЗОПАСНЫЙ') || val.includes('безопасный')) {
                            return 'color: #27ae60; font-weight: 600;';
                        } else if (val.includes('ТРЕБУЕТ ДОРАБОТКИ') || val.includes('требует доработки')) {
                            return 'color: #f39c12; font-weight: 600;';
                        } else if (val.includes('РИСКОВАННЫЙ') || val.includes('рискованный')) {
                            return 'color: #e74c3c; font-weight: 600;';
                        }
                    }
                    return '';
                };
                
                const style = getValueStyle(label, value);
                const styleAttr = style ? ` style="${style}"` : '';
                
                return `
                    <div class="report-item">
                        <span class="report-label">${label}</span>
                        <span class="report-value"${styleAttr}>${value}</span>
                    </div>
                `;
            }
            
            // Обрабатываем данные на основе схемы
            processObject(data, schema);
            //console.log(html);
            reportContent.innerHTML = html;
        }

        // Функция для получения рекомендаций
        function getRecommendation(isSafe, threatCount) {
            if (isSafe) {
                return "Файл можно использовать без ограничений. Рекомендуется регулярно проверять файлы на наличие угроз.";
            } else {
                if (threatCount > 3) {
                    return "Файл содержит несколько потенциальных угроз. Рекомендуется удалить файл и выполнить проверку системы.";
                } else {
                    return "Файл содержит подозрительные элементы. Рекомендуется проверить файл антивирусом перед использованием.";
                }
            }
        }
